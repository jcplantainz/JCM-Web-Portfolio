# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: jcplantainz/JCM-Web-Portfolio
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/2498f4a3-4af7-413b-88d9-4c0bce9fbbdd/pkce
  auth_token_endpoint: /sites/2498f4a3-4af7-413b-88d9-4c0bce9fbbdd/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://jcmarcellus.cc
display_url: https://jcmarcellus.cc

# Where the dashboard commits any images you upload.
media_folder: "media"
public_folder: "/media"

locale: en

collections:
  - name: "site"
    label: "Portfolio"
    delete: false
    files:
      - name: "content"
        label: "Films & Site Settings"
        file: "content/site.json"
        description: "Edit your films, reorder them, swap video links, rename categories. Click Publish to push it live."
        fields:
          - label: "Tagline (under your name on the home screen)"
            name: "tagline"
            widget: "string"
            required: false

          - label: "Category names"
            name: "categoryLabels"
            widget: "object"
            collapsed: true
            hint: "Rename the four filter tabs. The films stay linked automatically."
            fields:
              - { label: "Commercials tab", name: "Commercials", widget: "string" }
              - { label: "Narrative tab", name: "Narrative", widget: "string" }
              - { label: "Music Videos tab", name: "Music Videos", widget: "string" }
              - { label: "Documentary tab", name: "Documentary", widget: "string" }

          - label: "Films"
            name: "films"
            widget: "list"
            label_singular: "Film"
            summary: "{{fields.title}} — {{fields.client}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Client", name: "client", widget: "string", required: false }
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["Commercials", "Narrative", "Music Videos", "Documentary"]
              - { label: "Your role", name: "role", widget: "string", required: false, hint: "e.g. Director of Photography, Editor, Directed/shot/edited" }
              - { label: "Year", name: "year", widget: "string", required: false }
              - { label: "Runtime", name: "runtime", widget: "string", required: false, hint: "e.g. 1:24 — leave blank to auto-read from the video" }
              - { label: "Video link", name: "video", widget: "string", required: false, hint: "YouTube, Vimeo, or a direct .mp4 URL" }
              - { label: "Poster image URL", name: "poster", widget: "string", required: false, hint: "Optional still. Leave blank for the gradient tile." }
